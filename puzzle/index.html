<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>🧩 拼图游戏</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ═══ 顶部工具栏 ═══ -->
  <div class="top-bar">
    <span class="title">🧩 拼图游戏</span>
    <div class="right-group" style="position:relative;">
      <!-- 音量调节弹窗 -->
      <div class="volume-popup" id="volume-popup">
        <label>🔊 音效 <input type="range" id="sfx-volume" min="0" max="100" value="60"></label>
        <label>🎵 音乐 <input type="range" id="bgm-volume" min="0" max="100" value="30"></label>
      </div>
      <button class="btn-icon" id="btn-sound" title="音效设置">🔊</button>
      <select class="grid-select" id="grid-input">
        <option value="4">4×4</option>
        <option value="5">5×5</option>
        <option value="6">6×6</option>
        <option value="7">7×7</option>
        <option value="8">8×8</option>
        <option value="9">9×9</option>
        <option value="10">10×10</option>
      </select>
    </div>
  </div>

  <!-- ═══ 状态栏：计时 & 步数 ═══ -->
  <div class="stats-bar">
    <span class="stat-item" id="stat-timer">⏱ 00:00</span>
    <span class="stat-item" id="stat-moves">🖐 0步</span>
    <button class="btn-pause" id="btn-pause" title="暂停 / 继续">⏯</button>
  </div>

  <!-- ═══ 游戏主区域 ═══ -->
  <main class="game-area">
    <div class="canvas-wrapper">
      <canvas id="puzzle-canvas"></canvas>
    </div>
  </main>

  <!-- ═══ 底部工具栏 ═══ -->
  <div class="bottom-bar">
    <button class="btn btn-pill" id="btn-preview">👁 查看原图</button>
    <button class="btn btn-pill" id="btn-upload">📷 换图</button>
    <button class="btn btn-pill" id="btn-restart">🔄 打乱</button>
  </div>

  <!-- ═══ 底部提示文字（仅手机端显示） ═══ -->
  <div class="mobile-hint" id="mobile-hint">👆 点击「👁 查看原图」查看完整图片，点击「📷 换图」更换图片</div>

  <!-- ═══ 完成弹窗 ═══ -->
  <div class="overlay" id="complete-overlay">
    <div class="overlay-card">
      <span class="overlay-icon">🎉</span>
      <span class="overlay-msg">恭喜完成！</span>
      <span class="overlay-stats" id="completion-stats"></span>
      <button class="overlay-btn" id="btn-replay">🔄 再来一局</button>
      <button class="overlay-btn secondary" id="btn-replay-harder">🔥 挑战更难</button>
    </div>
  </div>

  <!-- ═══ 庆祝彩带容器 ═══ -->
  <div class="confetti-container" id="confetti-container"></div>

  <script src="js/game.js"></script>

</body>

</html>
